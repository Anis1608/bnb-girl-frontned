    <!-- Prefetch CMS content to eliminate flicker -->
    <script>
      (function() {
        window.__CMS_DATA__ = null;
        fetch('https://api.bnbgirl.com/api/cms')
          .then(function(r) { return r.json(); })
          .then(function(d) {
            window.__CMS_DATA__ = d;
            try {
              localStorage.setItem('bbg_cms', JSON.stringify(d));
            } catch (e) {}
            window.dispatchEvent(new CustomEvent('cms-loaded', { detail: d }));
          })
          .catch(function(e) { console.error('CMS prefetch error:', e); });
      })();
    </script>
